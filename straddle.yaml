# lxmf — LXMF messaging on spangap.
#
# Multi-identity, opportunistic single-packet delivery plus on-demand
# Link + Resource transfer for larger messages. Storage is the API —
# every frontend (browser, CLI, on-device UI) reads/writes the
# `s.lxmf.*` / `lxmf.*` / `secrets.lxmf.*` keys; the lxmf task subscribes
# to its own subtree.
#
# Browser half: settings + the chat UI (ConversationList, ConversationThread,
# Composer, MessageBubble, …).
# LCD slice: the on-device messaging program (esp-idf/conditional/spangap-lcd/).
schema_version: 1
name: reticulous/lxmf
prefix: lxmf
version: 0.0.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - reticulous/rns
# The message-notification sound (s.lxmf.sound) plays through the optional
# spangap/audio engine, but lxmf does NOT stage it — audio is board hardware,
# staged by boards that have it (e.g. hw-tdeck additional-installs it). Every
# call site is gated on CONFIG_STRADDLE_AUDIO, so a build without audio still
# links (just no notification sound) — that's how heltec/generic reticulous
# builds stay audio-free while the T-Deck gets the ping.
# Boot-registered Services, folded into the generated boot dispatcher. Runs in
# the straddle band; `requires: reticulous/rns` puts rnsd ahead of both.
#   - LxmfService (core): brings up the lxmf task — always started, even on a
#     transport-only node, so the announce fanout + cmd handlers are live.
#   - LxmfApp (LCD): the on-device LXMessenger. It is an LcdApp, so this entry
#     installs its launcher tile (LcdApp::onInit) and does its boot wiring
#     (LxmfApp::appInit — Settings pane, the lxmf.url_lcd open-URL subscription).
#     when:-gated on spangap/spangap-lcd — the whole LxmfApp class lives under
#     conditional/spangap-lcd/, so without the lcd straddle staged neither the
#     trampoline nor the class compiles. The platform band brings the lcd task up
#     before the straddle band, so the tile-install hop always has a live task.
# The consumer's app_main references lxmf nowhere.
services:
  - { class: LxmfService, header: lxmf.h }
  - { class: LxmfApp, header: lxmf_app.h, when: spangap/spangap-lcd }

# Browser-side UI registration (parallel to init: above) — auto-wired into
# the buildable SPA via straddles.gen.ts; no web-interface edit needed.
browser_register:
  - call: registerLxmf
